nelmio_api_doc:
    documentation:
        info:
            title: Jotly API
            description: API documentation for the Jotly Symfony application.
            version: 1.0.0
        components:
            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
            schemas:
                UserProfile:
                    type: object
                    properties:
                        id:
                            type: string
                            format: uuid
                        name:
                            type: string
                        email:
                            type: string
                            format: email
                        status:
                            type: string
                            example: active
                        avatar:
                            type: string
                            nullable: true
                AuthResponse:
                    type: object
                    properties:
                        user:
                            $ref: '#/components/schemas/UserProfile'
                        token:
                            type: string
                ValidationErrorResponse:
                    type: object
                    properties:
                        message:
                            type: string
                        errors:
                            type: object
                            additionalProperties:
                                type: array
                                items:
                                    type: string
                SuccessResponse:
                    type: object
                    properties:
                        success:
                            type: boolean
                            example: true
                ListItem:
                    type: object
                    properties:
                        id:
                            type: string
                            format: uuid
                        user_name:
                            type: string
                        list_id:
                            type: string
                            format: uuid
                        version:
                            type: integer
                        is_completed:
                            type: boolean
                        name:
                            type: string
                            nullable: true
                        attributes:
                            type: object
                            additionalProperties: true
                        description:
                            type: string
                            nullable: true
                        user_avatar:
                            type: string
                            nullable: true
                        completed_user_name:
                            type: string
                            nullable: true
                        completed_user_avatar:
                            type: string
                            nullable: true
                ListSummary:
                    type: object
                    properties:
                        id:
                            type: string
                            format: uuid
                        owner_id:
                            type: string
                            format: uuid
                        name:
                            type: string
                        is_template:
                            type: boolean
                        type:
                            type: string
                            example: shopping
                        owner_name:
                            type: string
                        touched_at:
                            type: string
                            example: '2026-04-28 15:30:00'
                        can_edit:
                            type: boolean
                        owner_avatar:
                            type: string
                            nullable: true
                        description:
                            type: string
                            nullable: true
                ListViewResponse:
                    type: object
                    properties:
                        model:
                            $ref: '#/components/schemas/ListSummary'
                        items:
                            type: array
                            items:
                                $ref: '#/components/schemas/ListItem'
                PaginatedListsResponse:
                    type: object
                    properties:
                        current_page:
                            type: integer
                        data:
                            type: array
                            items:
                                $ref: '#/components/schemas/ListSummary'
                        first_page_url:
                            type: string
                        from:
                            type: integer
                            nullable: true
                        last_page:
                            type: integer
                        last_page_url:
                            type: string
                        links:
                            type: array
                            items:
                                type: object
                                properties:
                                    url:
                                        type: string
                                        nullable: true
                                    label:
                                        type: string
                                    page:
                                        type: integer
                                        nullable: true
                                    active:
                                        type: boolean
                        next_page_url:
                            type: string
                            nullable: true
                        path:
                            type: string
                        per_page:
                            type: integer
                        prev_page_url:
                            type: string
                            nullable: true
                        to:
                            type: integer
                            nullable: true
                        total:
                            type: integer
    areas:
        default:
            path_patterns:
                - ^/api(?!/doc(?:\.json)?$)
