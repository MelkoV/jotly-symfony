security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            id: App\Security\UserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        - { path: ^/api/doc(?:\.json)?$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/user/sign-up$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/user/sign-in$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/user/refresh-token$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/user/logout$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/feedback$, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
