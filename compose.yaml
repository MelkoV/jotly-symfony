services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - '.:/var/www/html'
      - "phpsocket:/var/run"
    networks:
      - jotly
    depends_on:
      - pgsql
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - '${APP_EXTERNAL_PORT:-80}:80'
    volumes:
      - "phpsocket:/var/run"
#      - ./:/app
    depends_on:
      - app
    networks:
      - jotly
  pgsql:
    image: 'postgres:17'
    ports:
      - '${DB_FORWARD_PORT:-5432}:5432'
    environment:
      PGPASSWORD: '${DB_PASSWORD:-secret}'
      POSTGRES_DB: '${DB_DATABASE}'
      POSTGRES_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
    volumes:
      - 'app-pgsql:/var/lib/postgresql/data'
    networks:
      - jotly
    healthcheck:
      test:
        - CMD
        - pg_isready
        - '-q'
        - '-d'
        - '${DB_DATABASE}'
        - '-U'
        - '${DB_USERNAME}'
      retries: 3
      timeout: 5s
networks:
  jotly:
    driver: bridge
volumes:
  app-pgsql:
    driver: local
  phpsocket:
